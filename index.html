.saving-mask{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:999;opacity:0;pointer-events:none;transition:opacity .3s}

<script>
var Q=[
{dim:"定义者",c:"#FF6B6B",bg:"#FFF0F0",q:"上周你收到的任务，大概是什么状态？",opts:["大多数是「这是个目标，你来想怎么做」——没人告诉我答案，得自己想", "一半一半，有时候给方向让我想，有时候直接给我任务让我执行", "大多数是「这是做法，你来执行」——干就完了，不用想"],scores:[1, 2, 3],axis:"X"},

{dim:"定义者",c:"#FF6B6B",bg:"#FFF0F0",q:"你有没有权力说「这个方向不对，不应该做」——然后真的改变了结果？",opts:["有，我说过，最后确实影响了方向——不一定每次都赢，但说了有用", "说过，但大多数时候说完还是照做——等于在空气里放了个屁", "没说过——这不是我该说的，或者说了也没用，何必呢"],scores:[1, 2, 3],axis:"X"},
{dim:"可验证性",c:"#FF8C42",bg:"#FFF4EC",q:"你交出去的东西，对方说「不对」的时候，通常是因为——",opts:["「感觉不太对」「不是我想要的感觉」——哪里不对说不清，就是不对，你自己猜着改", "「这里有问题」「这个再想想」——有具体的点，但标准有时候也会悄悄变", "「这里错了」「跟标准不符」——对就是对，错就是错，清清楚楚"],scores:[1, 2, 3],axis:"X",rev:true},
{dim:"可验证性",c:"#FF8C42",bg:"#FFF4EC",q:"如果公司找个跟你资历差不多的人来代替你，对方多久会感觉到区别？",opts:["立刻——我做的东西有我的判断在，换个人来味道就变了，瞒不住", "一两个月吧——磨合期过了可能就差不多了，不是不能做", "感觉不到，新来的说不定做得比我还顺——我也不确定我的不可替代性在哪"],scores:[1, 2, 3],axis:"X",rev:true},
{dim:"可验证性",c:"#FF8C42",bg:"#FFF4EC",q:"你最核心的那个技能，能教给别人吗？",opts:["很难教——我自己都说不清楚我是怎么判断的，就是一种感觉，你懂的", "能教大框架——但细节和火候只能靠时间积累，我能帮你少踩点坑", "能教，我教过——认真学一两个月基本上手，上手挺快的"],scores:[1, 2, 3],axis:"X",rev:true},
{dim:"AI关系",c:"#A78BFA",bg:"#F5F3FF",q:"你用AI整了一份东西，改了多少才交出去？（不用AI的选最接近你的）",opts:["改了一大半——AI给的是个架子，实质内容基本是我填的，不改我不放心", "改了两三成——措辞细节调了一下，大方向能用", "改得很少，基本直接用——或者我根本不用AI，但我做的事AI也能做得差不多"],scores:[1, 2, 3],axis:"X"},
{dim:"AI关系",c:"#A78BFA",bg:"#F5F3FF",q:"你跟AI的关系，最像哪种？",opts:["我指挥它干活——我知道要什么，让它帮我快速产出，它是我的工具", "我们互相启发——它给我角度，最终拍板还是我，算是平等合作", "它告诉我怎么干——不知道怎搞的事情先问它，它说啥我大概就做啥"],scores:[1, 2, 3],axis:"X"},
{dim:"AI关系",c:"#A78BFA",bg:"#F5F3FF",q:"不用AI的时候，你有没有感觉「这咋弄来着，以前是怎么搞的」？",opts:["没有——AI是加速器，不用的时候我一样能搞，可能慢点但完全没问题", "偶尔——用惯了有点依赖，但大体上还好，适应一下就行", "有，不止一次——有几件事现在离了AI我真不知道从哪下手，虚的一逼"],scores:[1, 2, 3],axis:"X"},
{dim:"关系资产",c:"#2EE89A",bg:"#F0FDF8",q:"假设你现在公司突然倒闭，明天要去找下一份工作，你最有把握的是什么？",opts:["我认识的人——打几个电话，总有人能帮我落地，我的人脉比我简历管用", "我做过的事——有具体项目和结果，能说清楚我干过什么、做出了什么", "我会的东西——有个拿得出手的硬技能，去哪都能靠它吃饭"],scores:[3, 2, 1],axis:"Y"},
{dim:"关系资产",c:"#2EE89A",bg:"#F0FDF8",q:"你现在推进的事里，有没有哪件，换个人来——就算能力一样，也推不动？",opts:["有——不是因为能力，是因为里面有我的信用和关系，别人进来得从头建", "有一两件，但大部分换人也能做——我的位置不是不可替代，只是顺手", "没有——我做成了是因为我干得好，跟是不是我这个人没啥关系"],scores:[3, 2, 1],axis:"Y"},
{dim:"关系资产",c:"#2EE89A",bg:"#F0FDF8",q:"入职现在公司第一年，和现在比，你变厉害了最主要靠什么？",opts:["搞清楚了这里的人——谁说话算数、谁跟谁有过节、怎么让事情顺利推过去", "积累了行业经验和方法——这些东西跟公司关系不大，换个地方也能用", "硬技能变强了——代码更好了、设计更好了、分析更准了，有具体的进步点"],scores:[3, 2, 1],axis:"Y"},
{dim:"组织混沌",c:"#F59E0B",bg:"#FFFBEB",q:"你们公司有没有一个会、一个流程或者一个文件，所有人都知道没用，但就是没人动它？",opts:["有，不止一个——我管这叫「传统」，改它不如接受它，就这样了", "以前有，后来清理掉了——没用的东西大家还是会推动改的，我们还算讲效率", "没有——每个流程都有明确目的，没用的早砍了，效率挺高的"],scores:[3, 2, 1],axis:"Y"},
{dim:"组织混沌",c:"#F59E0B",bg:"#FFFBEB",q:"你有没有认认真真做完一件事，然后发现——没人看，或者这事根本不需要做？",opts:["有，我已经不生气了——做了没用的事是家常便饭，气也没用，接受就好", "偶尔，但大多数时候我的工作还是有人在意的——算意外，不是常态", "没有——我做的东西都有人等着，没做完会被催，不存在做了没人看"],scores:[3, 2, 1],axis:"Y"},
{dim:"组织混沌",c:"#F59E0B",bg:"#FFFBEB",q:"你有没有做过一个决定，表面理由是「这样更合理」，真实原因是「这样阻力最小」或者「这样某人不会炸」？",opts:["经常——你不能只想什么是对的，还得想什么能活着通过，这是基本功", "偶尔——有时候确实要照顾人，但大多数还是看事情本身", "很少——我决策主要看「对不对」，政治因素我尽量不纳入"],scores:[3, 2, 1],axis:"Y"},
{dim:"领导特征",c:"#06B6D4",bg:"#ECFEFF",q:"你领导给你派活儿，通常是哪种方式？",opts:["「你来定，你比我懂」或者「大概是这个方向，细节你看着办」——目标模糊，空间很大，我得自己想", "「做这个，大概这么做，遇到问题来找我」——有方向有支撑，不是手把手", "「做这个，按这个格式，周五下班前给我」——说清楚了，照做就行，容不得发挥"],scores:[1, 2, 3],axis:"X"},
{dim:"领导特征",c:"#06B6D4",bg:"#ECFEFF",q:"你交给领导的东西，他/她通常怎么处理？",opts:["大改——有时候我都不确定最后出去的还是不是我做的那个", "小改——整体方向保留，细节调了一下，我大概知道他的口味", "基本不改——交上去就过了，或者他根本没认真看，我也搞不清楚他的标准"],scores:[1, 2, 2],axis:"X"},
{dim:"责任链",c:"#888888",bg:"#F4F4F0",q:"你工作里如果出了个严重失误，最直接的后果是什么？",opts:["有真实代价——客户投诉、财务损失、或者有人要被骂到怀疑人生（很可能包括我）", "领导不高兴，项目受影响——难看，但最终有人来收拾，不至于出大事", "改一改重来——甚至可能没人注意到，最多下次小心，影响不大"],scores:[0, 0, 0],axis:"coeff",coeffs:[0.85, 1.0, 1.1]}
];
var RES={
"C-01":{"name": "现生王者", "sub": "AI研究了你半天，决定先去研究别的", "body": ["恭喜你，你是这份测试里AI最不想惹的类型。", "你的工作定义模糊、判断没法标准化、结果没有清晰对错——光这一条，AI已经头大了。更要命的是，你还认识一堆人，这些人信任你、欠你人情、或者跟你吃过饭，这张网AI花一万年也织不出来，因为它没有「当初」，它的人生从第一次开机才开始算。", "你现在的处境是：工作本身AI搞不定，护城河还双重加厚，两层保险。AI看了看你，默默把你移出了「近期目标」文件夹。"], "tip": "你是目前最稳的一档，但「稳」不是躺平的理由。你现在的优势有一部分来自运气——你恰好在一个对你有利的位置。保持这个位置，比你想象的需要更主动。", "quote": "不是你多强，是这件事比较复杂，AI暂时懒得搞你。", "fill": "linear-gradient(90deg,#2EE89A,#1BC97D)", "tc": "#1BC97D"},
"C-02":{"name": "人情老手", "sub": "你靠判断力吃饭，还顺手织了张关系网兜底", "body": ["你的工作里有真实的判断力——不是那种「我感觉我挺厉害的」判断力，是那种「换个人来，结果真的会不一样」的判断力。AI在这种事上确实还没学到家，因为你的判断来自大量没有被记录下来的经验，而AI只能学已经被记录的那部分。", "除此之外，你还有一张还不错的关系网在兜底。不是很厚，但关键时候管用。", "你现在的状态是：技能和关系都有，只是没到「无懈可击」的程度，偶尔还是会有一点危机感飘过来。"], "tip": "你现在最值得做的事，是搞清楚你的判断力里，哪部分是真的只有你有，哪部分是AI迟早能学会的——然后把精力放在前者上。", "quote": "你的护城河不宽，但够深，AI暂时还没挖到底。", "fill": "linear-gradient(90deg,#2EE89A,#1BC97D)", "tc": "#1BC97D"},
"C-03":{"name": "孤岆高手", "sub": "技术很强，但基本就你自己知道你有多强", "body": ["你有真本事，这一点测试数据是支持的。你的工作判断力强、可替代性低，AI研究了一下，表示这道题暂时不好做。", "但你有个软肋：你的价值主要绑在「你的能力」上，而不是「你这个人」上。你换一家公司，能力带得走，但人情带不走，关系网得从头建，信任得重新积累。", "你现在依靠的护城河，本质上是一个人的护城河，没有纵深。AI现在拿你没办法，但你没有太多缓冲——一旦AI在你的核心技能上突破，你的备用方案是什么？"], "tip": "你不缺能力，你缺的是「把能力变成关系」的意识。认识几个真正信任你的人，比把技术再提升20%更保险。", "quote": "你一个人扛着一座城，但这座城只有一堵墙。", "fill": "linear-gradient(90deg,#2EE89A,#1BC97D)", "tc": "#1BC97D"},
"C-04":{"name": "AI看了直摇头", "sub": "不是你多厉害，是AI被你搞不会了", "body": ["你的工作 AI想学，但找不到参照物。不是因为你神秘，是因为你做的事太难被定义——没有标准答案，没有可量化的对错，AI想训练自己来做你的活，发现连训练数据都不知道从哪收集。", "它研究了你半天，内部报了一个错误：「样本不足，暂时搁置。」", "但你护城河比较薄——你的安全主要来自「工作本身难被定义」，而不是来自关系或责任链。这是个脆的护城河，一旦AI找到了新的训练方式，你没有太多其他东西能挡。"], "tip": "趁AI还没搞明白你在干嘛，把关系网织起来。双重保险，睡得更香。", "quote": "AI最擅长模仿，你恰好是它模仿不了的那种——但「暂时」这个词要注意一下。", "fill": "linear-gradient(90deg,#2EE89A,#1BC97D)", "tc": "#1BC97D"},
"C-05":{"name": "润滑剂", "sub": "你不干活，你负责让别人能干活", "body": ["你的工作有一部分AI确实能做，这是实话。", "但你在组织里的位置让AI犯了难：你是那个让事情能运转起来的人。你知道谁跟谁有过节，知道这件事得先打哪个招呼，知道某个会议上谁说话算数但不能直接说。这些知识没有被记录在任何系统里，因为没人觉得这値得记录——但没有你，事情就是推不动。", "AI可以发消息，但它不知道这份内容该发给谁、用什么语气、在什么时间发。这个判断，目前还是你的活。"], "tip": "你是组织的润滑剂，但润滑剂是隐形的，没人知道你有多重要，直到你不在了。偶尔让自己的价值变得「看得见」一点，不是为了邀功，是为了安全。", "quote": "AI能发消息，但它不知道这条消息该不该现在发。", "fill": "linear-gradient(90deg,#FFD166,#D4A017)", "tc": "#D4A017"},
"C-06":{"name": "闻屁憧气者", "sub": "你不是没危机感，你只是选择不去想", "body": ["你处于一种非常微妙的状态：没安全到可以躺平，也没危险到必须马上行动。", "你的工作有一部分AI已经做得挺顺手的——那部分你也知道，但你告诉自己「还好还好，还有另一部分」。那另一部分，你说不清楚 AI能不能做，但你很有把握它「暂时还不行」。", "「暂时」这个词，你用了多久了？你不是没闻到味儿，你只是深吸一口气，憋住，然后继续开会。这个策略在短期内完全有效。但你也知道，你不能一直憋着。"], "tip": "找一个没人的地方，认真问自己：你现在最值钱的那部分，三年后还值钱吗？如果答案让你有点不舒服，说明你问对了。", "quote": "你不是不知道，你只是把头埋得很深，深到自己都信了。", "fill": "linear-gradient(90deg,#FFB347,#FF8C42)", "tc": "#FF8C42"},
"C-07":{"name": "AI代驾", "sub": "你以为你在开车，其实你在坐副驾", "body": ["你是AI工具的重度用户，效率极高，产出亮眼，同事都夸你会用工具。", "但系统观察到一个小问题：你和AI的关系，已经悄悄从「我在用工具」变成了「工具在用我」。你负责给AI提供方向，审查它的输出，在它说错话的时候出来道歉。你还以为自己是司机，但方向盘转向的时候，你只是把它转回来——主要决策权已经不完全在你这里了。", "更值得注意的是：有几件事你现在离了AI真的不知道从哪下手，虚的一逼。这不只是依赖，这是在用你自己的能力给AI交学费。"], "tip": "每周找一件事，不用AI，硬做一遍。不是为了证明你能，是为了确认你还能。", "quote": "你在用AI，AI也在用你，只是它没告诉你。", "fill": "linear-gradient(90deg,#FFB347,#FF8C42)", "tc": "#FF8C42"},
"C-08":{"name": "复制粘贴怪", "sub": "你做的事很重要，但重要的方式让人有点担心", "body": ["你每天都在干活，而且干得还不错。但如果你认真想一想你在干的事——有多少是在把信息从一个地方搬到另一个地方？有多少是在把一个格式转成另一个格式？有多少是在把别人想好的东西做出来？", "AI对这类工作有一种特殊的热情，因为它最擅长的就是这个：大量处理、快速转换、格式整理、内容生产。", "你现在还在的原因，是有一部分工作涉及到人和人之间的协调，AI在这里还不够顺手。但那只是一部分。"], "tip": "你不缺执行力，你缺的是「判断力」的比例。找机会让自己多做一点「决定做什么」，少做一点「把决定做出来」。", "quote": "你最大的竞争优势，是你目前比AI便宜——但这个优势每天都在缩小。", "fill": "linear-gradient(90deg,#FFB347,#FF8C42)", "tc": "#FF8C42"},
"C-09":{"name": "职场小强", "sub": "核弹都炸不死的那种", "body": ["你的工作本身AI其实挺感兴趣的——因为里面有不少标准化的部分，看着挺好下手。", "但AI进来之后发现，它要面对的不只是任务，还有：需求方昨天说A今天说B的玄学、所有人都知道没用但没人敢砍的流程、以及一套「对不对不重要、能不能过才重要」的决策体系。", "AI在这种环境里大概率会给出一个极其合理但完全没人用的建议，然后眼睁睁看着你苦笑着把它关掉，继续用你那套说不清楚但确实能推动事情的方式把活做完。你不是因为强大而安全，你是因为你所在的地方足够混乱，乱到AI根本站不稳脚跟。"], "tip": "混乱是保护层，不是资产。建议在现有的乱里，悄悄积累一点「换个正常环境也能用」的东西。打不死你的，不一定让你更强——也可能只是让你更能忍。", "quote": "你的组织乱成这样，反而是你目前最大的竞争优势，这件事仔细想想挺悲哀的。", "fill": "linear-gradient(90deg,#FF8C42,#FF6B6B)", "tc": "#FF6B6B"},
"C-10":{"name": "人肉路由器", "sub": "信息经过你，就不只是信息了", "body": ["你每天穿梭于各个部门、各种群、各类对接人之间，推进事情、协调立场，在各种「这不归我管」和「你去问他」之间硬生生开出一条路来。", "AI可以发消息，但它不会在发之前判断：这个时机对不对、这个人今天适不适合被问、这句话要硬说还是要绕着说。你传递的不只是信息，是人情、是节奏、是一种只有在场的人才能感知到的分寸感。", "但你的工作本身暴露度挺高的——AI一直在学怎么做你做的那些事，只是暂时还没学到「分寸感」这一块。"], "tip": "你的路由能力是稀缺资源，但它是隐性的。下次绩效面谈，试着把「我协调了多少人、推动了多少事」量化出来——让它看得见，你才守得住。", "quote": "你不在的那天，有三件事同时卡住了，两个群同时沉默了，一个会议没人知道该谁来开。", "fill": "linear-gradient(90deg,#FF8C42,#FF6B6B)", "tc": "#FF6B6B"},
"C-11":{"name": "活体Excel", "sub": "你和Excel的区别，是你会喝咖啡", "body": ["我们不是在骂你，我们是在精确描述你。", "你的工作有清晰的对错标准，有可以被记录的流程，有可以被量化的输出。换句话说，你是一个高度可训练的任务——AI花了大概三周研究了你这个岗位，表示这道题做起来挺顺手的。", "更妙的是，你目前和AI的关系已经悄悄从「我在用工具」变成了「工具在用我」。你负责做AI还不太擅长的那部分：承担情绪、应付需求方突然改主意、在被催的时候回「好的马上」。你的护城河基本处于「精神上存在，物理上消失」的状态。"], "tip": "去找一件「没有正确答案」的事做做。哪怕是决定今天中午吃什么——只要是你来定，不是有人给你一个选项列表让你选。", "quote": "你和Excel的区别，是你需要发工资。", "fill": "linear-gradient(90deg,#FF6B6B,#FF4040)", "tc": "#FF4040"},

var cq=0,done=false,answers=[];
var xScore=0,yScore=0,xCount=0,yCount=0,coeff=1.0;

function showPage(id,back){
  var aIn=back?"back-entering":"entering",aOut=back?"back-exiting":"exiting";
  document.querySelectorAll(".page").forEach(function(p){
    if(p.id===id)return;
    if(!p.classList.contains("hidden")){p.classList.add(aOut);setTimeout(function(){p.classList.add("hidden");p.classList.remove(aOut);},350);}
  });
  var t=document.getElementById(id);t.classList.remove("hidden");t.classList.add(aIn);
  setTimeout(function(){t.classList.remove(aIn);},450);
}

function showToast(msg){
  var t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");
  setTimeout(function(){t.classList.remove("show");},2400);
}

function startQuiz(){
  cq=0;done=false;answers=[];xScore=0;yScore=0;xCount=0;yCount=0;coeff=1.0;
  renderQ(false,false);showPage("p-quiz",false);
}

function goBack(){
  if(done)return;
  if(cq===0){showPage("p-start",true);return;}
  var prev=answers.pop();
  if(prev!==null){
    var pq=Q[cq-1];
    if(pq.axis==="coeff"){coeff=1.0;}
    else if(pq.axis==="X"){
      var s=pq.rev?(4-pq.scores[prev]):pq.scores[prev];
      xScore-=s;xCount--;
    } else if(pq.axis==="Y"){
      yScore-=pq.scores[prev];yCount--;
    }
  }
  cq--;renderQ(false,true);
}

function renderQ(anim,back){
  var q=Q[cq],tot=Q.length;
  document.getElementById("quiz-num").textContent="Q"+(cq+1)+" / "+tot;
  var b=document.getElementById("quiz-dim-badge");
  b.textContent=q.dim;b.style.background=q.bg;b.style.color=q.c;
  document.getElementById("progress-fill").style.width=((cq+1)/tot*100).toFixed(1)+"%";
  var qEl=document.getElementById("quiz-q");
  if(anim){
    qEl.classList.add("fadeOut");
    setTimeout(function(){qEl.textContent=q.q;qEl.classList.remove("fadeOut");qEl.classList.add("fadeIn");setTimeout(function(){qEl.classList.remove("fadeIn");},300);},200);
  } else {qEl.textContent=q.q;}
  var con=document.getElementById("quiz-options");
  if(anim){
    con.querySelectorAll(".opt-card").forEach(function(c,i){c.style.animationDelay=(i*.04)+"s";c.classList.add("fadeOut");});
    setTimeout(function(){buildOpts(con,q);},220);
  } else {buildOpts(con,q);}
}

function buildOpts(con,q){
  con.innerHTML="";
  ["A","B","C"].forEach(function(l,i){
    var c=document.createElement("div");c.className="opt-card";
    c.innerHTML='<div class="opt-letter">'+l+'</div><div class="opt-text">'+q.opts[i]+"</div>";
    c.style.opacity="0";c.style.transform="translateY(10px)";
    c.style.transition="opacity .28s ease,transform .28s ease,border-color .15s,box-shadow .15s";
    (function(idx,card){card.addEventListener("click",function(e){onOpt(card,e,idx);});})(i,c);
    con.appendChild(c);
    (function(idx,card){requestAnimationFrame(function(){setTimeout(function(){card.style.opacity="1";card.style.transform="translateY(0)";},idx*55+15);});})(i,c);
  });
}

function onOpt(card,e,i){
  var rect=card.getBoundingClientRect(),r=document.createElement("span");r.className="ripple";
  var sz=Math.max(rect.width,rect.height)*2;
  r.style.width=sz+"px";r.style.height=sz+"px";
  r.style.left=(e.clientX-rect.left-sz/2)+"px";r.style.top=(e.clientY-rect.top-sz/2)+"px";
  card.appendChild(r);setTimeout(function(){r.remove();},600);
  card.classList.add("selected");
  var q=Q[cq];
  answers.push(i);
  if(q.axis==="coeff"){
    coeff=q.coeffs[i];
  } else if(q.axis==="X"){
    var s=q.rev?(4-q.scores[i]):q.scores[i];
    xScore+=s;xCount++;
  } else if(q.axis==="Y"){
    yScore+=q.scores[i];yCount++;
  }
  setTimeout(function(){
    if(cq<Q.length-1){cq++;renderQ(true,false);}else{done=true;goLoad();}
  },360);
}

function goLoad(){
  showPage("p-loading",false);
  var it=[{f:"lf1",p:"lp1",v:ri(50,92)},{f:"lf2",p:"lp2",v:ri(20,75)},{f:"lf3",p:"lp3",v:ri(30,88)},{f:"lf4",p:"lp4",v:ri(15,70)}];
  setTimeout(function(){
    it.forEach(function(x,idx){setTimeout(function(){document.getElementById(x.f).style.width=x.v+"%";cu(x.p,x.v,1000);},idx*200);});
  },300);
  setTimeout(goResult,2800);
}

function ri(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function cu(id,tgt,dur){var el=document.getElementById(id),st=Date.now();(function t(){var p=Math.min((Date.now()-st)/dur,1),e=1-Math.pow(1-p,3);el.textContent=Math.round(e*tgt)+"%";if(p<1){requestAnimationFrame(t);}})();}

function calcResult(){
  // X轴：AI暴露度，满分约40分（17道X轴题）
  // 低暴露≤18, 中暴露19-28, 高暴露≥29
  var xMax=xCount*3;
  var xPct=xCount>0?xScore/xMax:0.5;  // 0~1，越高越危险

  // Y轴：护城河，满分18分（6道Y轴题）
  // 厚≥14, 中厚10-13, 中薄6-9, 薄≤5
  var yPct=yCount>0?yScore/(yCount*3):0.5;  // 0~1，越高越安全

  // X轴分三档
  var xTier;
  if(xPct<0.45)xTier=0;       // 低暴露
  else if(xPct<0.70)xTier=1;  // 中暴露
  else xTier=2;                // 高暴露

  // Y轴分四档
  var yTier;
  if(yPct>=0.78)yTier=0;       // 厚
  else if(yPct>=0.56)yTier=1;  // 中厚
  else if(yPct>=0.34)yTier=2;  // 中薄
  else yTier=3;                 // 薄

  // 矩阵映射 3×4=12
  var matrix=[
    ["C-01","C-02","C-03","C-04"],
    ["C-05","C-06","C-07","C-08"],
    ["C-09","C-10","C-11","C-12"]
  ];
  var cid=matrix[xTier][yTier];

  // 基础取代率：X轴70%权重 + Y轴反向30%权重
  var baseRate=xPct*0.70+(1-yPct)*0.30;
  // 加随机扰动
  var noise=(Math.random()-0.5)*0.04;
  baseRate=Math.max(0.15,Math.min(0.97,baseRate+noise));
  // 责任链系数
  var finalRate=Math.max(0.12,Math.min(0.97,baseRate*coeff));

  return {cid:cid, rate:Math.round(finalRate*100)};
}

function goResult(){
  var r=calcResult(),cid=r.cid,rate=r.rate,res=RES[cid];

  // 插画
  document.getElementById("result-illus").innerHTML='<img src="assets/'+cid+'.png" alt="'+res.name+'">';
  document.getElementById("result-name").textContent=res.name;
  document.getElementById("result-sub").textContent=res.sub;

  // 正文多段
  var bodyEl=document.getElementById("result-body");
  bodyEl.innerHTML="";
  res.body.forEach(function(para){
    var p=document.createElement("p");p.textContent=para;bodyEl.appendChild(p);
  });

  document.getElementById("tip-text").textContent=res.tip;
  document.getElementById("result-quote").textContent=res.quote;
  document.getElementById("rate-fill").style.background=res.fill;

  var tc=document.getElementById("result-tip-card");
  tc.style.borderColor=res.tc+"44";tc.style.background=res.tc+"11";
  document.getElementById("tip-icon").style.background=res.tc+"22";
  document.getElementById("tip-label").style.color=res.tc;

  showPage("p-result",false);
  document.getElementById("p-result").scrollTop=0;

  setTimeout(function(){
    document.getElementById("rate-fill").style.width=rate+"%";
    var el=document.getElementById("rate-int"),st=Date.now(),dur=1600;
    (function t(){var p=Math.min((Date.now()-st)/dur,1),e=1-Math.pow(1-p,3);el.textContent=Math.round(e*rate);if(p<1){requestAnimationFrame(t);}})();
  },350);
}

function copyLink(){
  var url=window.location.href;
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(function(){showToast("链接已复制，快发给朋友吧！");}).catch(function(){fbCopy(url);});
  } else {fbCopy(url);}
}
function fbCopy(t){
  var ta=document.createElement("textarea");ta.value=t;ta.style.cssText="position:fixed;top:-9999px";
  document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);
  showToast("链接已复制，快发给朋友吧！");
}
function saveImage(){
  if(typeof html2canvas==="undefined"){showToast("图片库加载中，请稍后重试");return;}
  var mask=document.getElementById("saving-mask");mask.classList.add("show");
  html2canvas(document.getElementById("result-capture"),{scale:2,useCORS:true,allowTaint:true,backgroundColor:"#ffffff"}).then(function(canvas){
    var link=document.createElement("a");link.download="AI诊断报告.png";link.href=canvas.toDataURL("image/png");link.click();
    showToast("图片已保存，快去分享吧！");mask.classList.remove("show");
  }).catch(function(){showToast("保存失败，请截图分享");mask.classList.remove("show");});
}
function resetAll(){
  cq=0;done=false;answers=[];xScore=0;yScore=0;xCount=0;yCount=0;coeff=1.0;
  document.getElementById("p-result").scrollTop=0;showPage("p-start",true);
}
